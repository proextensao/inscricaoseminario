<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel de Controle</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <style>
    :root {
      --bg:        #050505;
      --surface:   #101010;
      --surface2:  #161616;
      --gold:      #d4af55;
      --gold-light:#e7c46d;
      --border:    rgba(212,175,85,0.18);
      --text:      #f3efe7;
      --muted:     rgba(255,255,255,0.45);
      --green:     #8ff0a4;
      --red:       #ff7b7b;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      padding: 40px;
      overflow-x: hidden;
    }
    body::before {
      content:'';
      position:fixed;
      inset:0;
      background: radial-gradient(ellipse at top, rgba(212,175,85,0.07), transparent 60%);
      pointer-events:none;
    }

    .topbar {
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:30px;
      margin-bottom:40px;
      flex-wrap:wrap;
    }
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.6rem,6vw,4.5rem);
      font-weight:300;
      line-height:1;
      margin-bottom:10px;
    }
    .subtitle { color:var(--muted); font-size:13px; letter-spacing:0.08em; }
    .modo-badge {
      margin-top:14px;
      display:inline-flex;
      align-items:center;
      gap:10px;
      padding:8px 14px;
      border-radius:999px;
      border:1px solid var(--border);
      background:rgba(255,255,255,0.02);
      font-size:11px;
      letter-spacing:0.12em;
      text-transform:uppercase;
    }
    .modo-dot { width:9px; height:9px; border-radius:50%; background:var(--green); }

    .top-actions {
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      align-items:center;
    }
    .card {
      background:rgba(255,255,255,0.02);
      border:1px solid var(--border);
      padding:20px 26px;
      border-radius:8px;
      min-width:200px;
    }
    .card-title  { color:var(--muted); font-size:10px; margin-bottom:8px; letter-spacing:0.14em; text-transform:uppercase; }
    .card-number { color:var(--gold); font-size:1.8rem; }

    .btn {
      background:transparent;
      border:1px solid var(--border);
      color:var(--gold);
      padding:13px 20px;
      border-radius:6px;
      cursor:pointer;
      transition:0.25s;
      font-family:'DM Mono',monospace;
      letter-spacing:0.12em;
      text-transform:uppercase;
      font-size:10px;
      white-space:nowrap;
    }
    .btn:hover  { background:rgba(212,175,85,0.08); border-color:var(--gold); }
    .btn.green  { border-color:rgba(143,240,164,0.35); color:var(--green); }
    .btn.green:hover { background:rgba(143,240,164,0.08); border-color:var(--green); }
    .btn.red    { border-color:rgba(255,123,123,0.35); color:var(--red); }
    .btn.red:hover   { background:rgba(255,123,123,0.08); border-color:var(--red); }
    .btn.blue   { border-color:rgba(100,160,255,0.35); color:#7eb8ff; }
    .btn.blue:hover  { background:rgba(100,160,255,0.08); border-color:#7eb8ff; }
    .btn.excel  { border-color:rgba(143,240,164,0.35); color:#7bffc8; }
    .btn.excel:hover { background:rgba(143,240,164,0.08); border-color:#7bffc8; }

    .btn-divider {
      width:1px; height:36px;
      background:var(--border);
      align-self:center;
    }

    .filters-bar {
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      align-items:center;
      margin-bottom:20px;
    }
    .filter-group { display:flex; flex-direction:column; gap:4px; }
    .filter-group label { font-size:9px; letter-spacing:0.2em; text-transform:uppercase; color:var(--muted); }
    .filter-group input,
    .filter-group select {
      background:var(--surface);
      border:1px solid var(--border);
      color:var(--text);
      padding:10px 14px;
      border-radius:4px;
      font-family:'DM Mono',monospace;
      font-size:11px;
      outline:none;
      transition:0.2s;
      min-width:160px;
    }
    .filter-group input:focus,
    .filter-group select:focus { border-color:rgba(212,175,85,0.5); }
    .filter-clear { align-self:flex-end; padding:10px 18px; font-size:10px; }

    .table-wrap {
      overflow-x:auto;
      border:1px solid var(--border);
      border-radius:10px;
      background:rgba(255,255,255,0.02);
      backdrop-filter:blur(12px);
    }
    table { width:100%; border-collapse:collapse; min-width:1200px; }
    thead { background:rgba(212,175,85,0.08); }
    th {
      color:var(--gold);
      font-size:11px;
      letter-spacing:0.12em;
      text-transform:uppercase;
      font-weight:400;
      padding:20px 18px;
      text-align:left;
      border-bottom:1px solid var(--border);
      cursor:pointer;
      user-select:none;
      white-space:nowrap;
    }
    th:hover { color:var(--gold-light); }
    th .sort-icon { margin-left:6px; opacity:0.5; font-size:10px; }
    th.sorted .sort-icon { opacity:1; }
    td {
      padding:18px;
      border-bottom:1px solid rgba(255,255,255,0.05);
      color:rgba(255,255,255,0.82);
      font-size:12px;
      line-height:1.5;
    }
    tbody tr:hover { background:rgba(255,255,255,0.03); }
    .status  { color:var(--green); }
    .hc-sim  { color:var(--green); font-weight:bold; }
    .hc-nao  { color:rgba(255,255,255,0.3); }
    .loading { padding:40px; color:var(--muted); text-align:center; }
    .count-bar { font-size:10px; color:var(--muted); letter-spacing:0.1em; margin-bottom:10px; }

    .presenca-select {
      background:var(--surface);
      border:1px solid var(--border);
      color:var(--text);
      padding:6px 10px;
      border-radius:4px;
      font-family:'DM Mono',monospace;
      font-size:11px;
      outline:none;
      cursor:pointer;
      transition:0.2s;
    }
    .presenca-select:focus { border-color:rgba(212,175,85,0.5); }
    .presenca-select.sim { color:var(--green); border-color:rgba(143,240,164,0.4); }
    .presenca-select.nao { color:var(--red);   border-color:rgba(255,123,123,0.3); }

    @media (max-width:900px) {
      body { padding:20px; }
      .topbar { flex-direction:column; }
    }
  </style>
</head>
<body>

<div class="topbar">
  <div>
    <h1>Painel de Controle</h1>
    <div class="subtitle">Lista de inscritos do seminário</div>
    <div class="modo-badge">
      <span class="modo-dot"></span>
      <span id="modoAtual">Modo inscrições ativo</span>
    </div>
  </div>

  <div class="top-actions">
    <div class="card">
      <div class="card-title">Total de inscritos</div>
      <div class="card-number" id="totalInscritos">0</div>
    </div>

    <button class="btn green" id="liberarHorasBtn">Liberar Horas Complementares</button>
    <button class="btn red"   id="liberarInscricoesBtn">Liberar Inscrições</button>

    <div class="btn-divider"></div>

    <button class="btn blue"  id="pdfTodosBtn">PDF — Todos</button>
    <button class="btn blue"  id="pdfHCBtn">PDF — Somente HC</button>

    <div class="btn-divider"></div>

    <button class="btn excel" id="xlsTodosBtn">Excel — Todos</button>
    <button class="btn excel" id="xlsHCBtn">Excel — Somente HC</button>

    <div class="btn-divider"></div>

    <button class="btn" id="alterarSenhaBtn">Alterar Senha</button>
    <button class="btn" onclick="window.location.href='index.html'">Voltar</button>
  </div>
</div>

<!-- FILTROS -->
<div class="filters-bar">
  <div class="filter-group">
    <label>Buscar nome / e-mail</label>
    <input type="text" id="filtroTexto" placeholder="Digite para filtrar…">
  </div>
  <div class="filter-group">
    <label>Curso</label>
    <select id="filtroCurso">
      <option value="">Todos os cursos</option>
    </select>
  </div>
  <div class="filter-group">
    <label>Vínculo</label>
    <select id="filtroVinculo">
      <option value="">Todos</option>
      <option value="aluno">Aluno</option>
      <option value="professor">Professor</option>
      <option value="tae">TAE</option>
      <option value="visitante_externo">Visitante externo</option>
      <option value="egresso">Egresso</option>
      <option value="outro">Outro</option>
    </select>
  </div>
  <div class="filter-group">
    <label>Horas Complementares</label>
    <select id="filtroHC">
      <option value="">Todos</option>
      <option value="SIM">SIM</option>
      <option value="NÃO">NÃO</option>
    </select>
  </div>
  <button class="btn filter-clear" id="limparFiltrosBtn">Limpar filtros</button>
</div>

<div class="count-bar" id="countBar"></div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th data-col="#">#<span class="sort-icon">↕</span></th>
        <th data-col="nome">Nome<span class="sort-icon">↕</span></th>
        <th data-col="matricula">Matrícula<span class="sort-icon">↕</span></th>
        <th data-col="email">E-mail<span class="sort-icon">↕</span></th>
        <th data-col="telefone">Telefone<span class="sort-icon">↕</span></th>
        <th data-col="curso">Curso<span class="sort-icon">↕</span></th>
        <th data-col="periodo">Período<span class="sort-icon">↕</span></th>
        <th data-col="vinculo">Vínculo<span class="sort-icon">↕</span></th>
        <th data-col="status">Status<span class="sort-icon">↕</span></th>
        <th data-col="hc">HC<span class="sort-icon">↕</span></th>
        <th>Presença</th>
      </tr>
    </thead>
    <tbody id="tabelaInscritos">
      <tr><td colspan="11" class="loading">Carregando inscrições…</td></tr>
    </tbody>
  </table>
</div>

<script type="module">
  import { initializeApp }   from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import {
    getFirestore, collection, getDocs, query, orderBy,
    doc, getDoc, setDoc, updateDoc
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA0iyMTBLvtvgb9ndrqOrZWTMH8bDXzqj0",
    authDomain: "projetos-de-extensao.firebaseapp.com",
    projectId: "projetos-de-extensao",
    storageBucket: "projetos-de-extensao.firebasestorage.app",
    messagingSenderId: "42869327067",
    appId: "1:42869327067:web:84d72c5db659990934b8fe",
    measurementId: "G-5YR6YD1Z24"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  let todosInscritos = [];
  let dadosFiltrados = [];
  let sortCol        = null;
  let sortAsc        = true;

  // Mapa de presença: id do inscrito → 'SIM' | 'NÃO' | ''
  const presencaMap = {};

  // ── configurações ──────────────────────────────────────────────────────────
  async function inicializarConfiguracoes() {
    const ref  = doc(db, 'configuracoes', 'painel');
    const snap = await getDoc(ref);
    if (!snap.exists()) {
      await setDoc(ref, { senha: 'BENAC', horasLiberadas: false });
      atualizarModoVisual(false);
    } else {
      atualizarModoVisual(snap.data().horasLiberadas);
    }
  }

  function atualizarModoVisual(hl) {
    const texto = document.getElementById('modoAtual');
    const dot   = document.querySelector('.modo-dot');
    if (hl) {
      texto.textContent    = 'Modo horas complementares ativo';
      dot.style.background = '#8ff0a4';
    } else {
      texto.textContent    = 'Modo inscrições ativo';
      dot.style.background = '#d4af55';
    }
  }

  // ── carregar inscritos ─────────────────────────────────────────────────────
  async function carregarInscritos() {
    try {
      const q        = query(collection(db, 'inscricoes'), orderBy('inscrito_em', 'desc'));
      const snapshot = await getDocs(q);

      todosInscritos = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
      document.getElementById('totalInscritos').textContent = todosInscritos.length;

      const cursos = [...new Set(todosInscritos.map(i => i.curso).filter(Boolean))].sort();
      const sel    = document.getElementById('filtroCurso');
      cursos.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c; opt.textContent = c;
        sel.appendChild(opt);
      });

      aplicarFiltros();
    } catch (err) {
      console.error(err);
      document.getElementById('tabelaInscritos').innerHTML =
        `<tr><td colspan="11" class="loading">Erro ao carregar dados.</td></tr>`;
    }
  }

  // ── filtros ────────────────────────────────────────────────────────────────
  function aplicarFiltros() {
    const texto   = document.getElementById('filtroTexto').value.toLowerCase();
    const curso   = document.getElementById('filtroCurso').value;
    const vinculo = document.getElementById('filtroVinculo').value;
    const hc      = document.getElementById('filtroHC').value;

    dadosFiltrados = todosInscritos.filter(i => {
      const matchTexto   = !texto   || (i.nome||'').toLowerCase().includes(texto) || (i.email||'').toLowerCase().includes(texto);
      const matchCurso   = !curso   || i.curso   === curso;
      const matchVinculo = !vinculo || i.vinculo === vinculo;
      const hcVal        = (i.horas_complementares || 'NÃO').toUpperCase();
      const matchHC      = !hc     || hcVal === hc;
      return matchTexto && matchCurso && matchVinculo && matchHC;
    });

    if (sortCol) ordenar(sortCol, false);
    else renderizar();
  }

  ['filtroTexto','filtroCurso','filtroVinculo','filtroHC'].forEach(id => {
    document.getElementById(id).addEventListener('input',  aplicarFiltros);
    document.getElementById(id).addEventListener('change', aplicarFiltros);
  });

  document.getElementById('limparFiltrosBtn').addEventListener('click', () => {
    document.getElementById('filtroTexto').value   = '';
    document.getElementById('filtroCurso').value   = '';
    document.getElementById('filtroVinculo').value = '';
    document.getElementById('filtroHC').value      = '';
    aplicarFiltros();
  });

  // ── ordenação ─────────────────────────────────────────────────────────────
  function ordenar(col, toggleDir = true) {
    if (toggleDir) {
      sortAsc = (sortCol === col) ? !sortAsc : true;
      sortCol = col;
    }

    dadosFiltrados.sort((a, b) => {
      let va = '', vb = '';
      if      (col === 'nome')      { va = a.nome||'';      vb = b.nome||''; }
      else if (col === 'matricula') { va = a.matricula||''; vb = b.matricula||''; }
      else if (col === 'email')     { va = a.email||'';     vb = b.email||''; }
      else if (col === 'curso')     { va = a.curso||'';     vb = b.curso||''; }
      else if (col === 'periodo')   { va = +(a.periodo)||0; vb = +(b.periodo)||0; return sortAsc ? va-vb : vb-va; }
      else if (col === 'vinculo')   { va = a.vinculo||'';   vb = b.vinculo||''; }
      else if (col === 'hc')        { va = a.horas_complementares||'NÃO'; vb = b.horas_complementares||'NÃO'; }
      return sortAsc
        ? String(va).localeCompare(String(vb), 'pt-BR')
        : String(vb).localeCompare(String(va), 'pt-BR');
    });

    document.querySelectorAll('th').forEach(th => th.classList.remove('sorted'));
    document.querySelectorAll('th[data-col]').forEach(th => {
      if (th.dataset.col === col) {
        th.classList.add('sorted');
        th.querySelector('.sort-icon').textContent = sortAsc ? ' ↑' : ' ↓';
      } else {
        const ic = th.querySelector('.sort-icon');
        if (ic) ic.textContent = ' ↕';
      }
    });

    renderizar();
  }

  document.querySelectorAll('th[data-col]').forEach(th => {
    th.addEventListener('click', () => {
      const col = th.dataset.col;
      if (col && col !== '#') ordenar(col);
    });
  });

  // ── renderizar tabela ──────────────────────────────────────────────────────
  function renderizar() {
    const tabela = document.getElementById('tabelaInscritos');
    document.getElementById('countBar').textContent =
      `Exibindo ${dadosFiltrados.length} de ${todosInscritos.length} inscrito(s)`;

    if (dadosFiltrados.length === 0) {
      tabela.innerHTML = `<tr><td colspan="11" class="loading">Nenhum registro encontrado.</td></tr>`;
      return;
    }

    tabela.innerHTML = dadosFiltrados.map((d, idx) => {
      const hcVal  = (d.horas_complementares || 'NÃO').toUpperCase();
      const hcTag  = hcVal === 'SIM'
        ? `<span class="hc-sim">SIM</span>`
        : `<span class="hc-nao">NÃO</span>`;
      const pVal   = presencaMap[d.id] || '';
      const pClass = pVal === 'SIM' ? 'sim' : pVal === 'NÃO' ? 'nao' : '';
      return `
        <tr>
          <td>${idx + 1}</td>
          <td>${d.nome      || '-'}</td>
          <td>${d.matricula || '-'}</td>
          <td>${d.email     || '-'}</td>
          <td>${d.telefone  || '-'}</td>
          <td>${d.curso     || '-'}</td>
          <td>${d.periodo   || '-'}</td>
          <td>${d.vinculo   || '-'}</td>
          <td><span class="status">${d.status || 'confirmado'}</span></td>
          <td>${hcTag}</td>
          <td>
            <select class="presenca-select ${pClass}" data-id="${d.id}"
              onchange="window._onPresenca(this)">
              <option value=""    ${pVal===''    ? 'selected':''}>—</option>
              <option value="SIM" ${pVal==='SIM' ? 'selected':''}>SIM</option>
              <option value="NÃO" ${pVal==='NÃO' ? 'selected':''}>NÃO</option>
            </select>
          </td>
        </tr>`;
    }).join('');
  }

  // Handler global de presença
  window._onPresenca = function(sel) {
    const id  = sel.dataset.id;
    const val = sel.value;
    presencaMap[id] = val;
    sel.className = 'presenca-select ' + (val === 'SIM' ? 'sim' : val === 'NÃO' ? 'nao' : '');
  };

  // ── helper: enriquecer lista com presença do mapa ─────────────────────────
  function listaComPresenca(lista) {
    return lista.map(d => ({
      ...d,
      presenca: presencaMap[d.id] || ''
    }));
  }

  // ── gerar PDF ─────────────────────────────────────────────────────────────
  // A4 landscape = 841.89 × 595.28 pt. Margens 36 pt cada lado → útil = 769.89 pt
  // Colunas (11 no total) — soma exata = 770 pt:
  //   #(20) | Nome(148) | Matric(70) | Email(142) | Tel(74) | Curso(88) | Per(26) | Vinculo(62) | Status(56) | HC(26) | Presença(58)
  //   20+148+70+142+74+88+26+62+56+26+58 = 770
  function gerarPDF(lista, titulo) {
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ orientation: 'landscape', unit: 'pt', format: 'a4' });

    // Cabeçalho do documento
    pdf.setFontSize(15);
    pdf.setTextColor(30, 30, 30);
    pdf.text('Seminario de Extensao - 3 Periodo', 36, 38);

    pdf.setFontSize(10);
    pdf.setTextColor(100, 100, 100);
    pdf.text(titulo, 36, 54);
    pdf.text(`Gerado em: ${new Date().toLocaleString('pt-BR')}`, 36, 67);

    const enriched = listaComPresenca(lista);

    // Cabeçalhos — "Per." alinhado à esquerda igual às outras colunas
    const head = [['#', 'Nome', 'Matricula', 'E-mail', 'Telefone', 'Curso', 'Per.', 'Vinculo', 'Status', 'HC', 'Presenca']];

    const body = enriched.map((d, i) => [
      i + 1,
      d.nome      || '-',
      d.matricula || '-',
      d.email     || '-',
      d.telefone  || '-',
      d.curso     || '-',
      d.periodo   || '-',
      d.vinculo   || '-',
      d.status    || 'confirmado',
      (d.horas_complementares || 'NAO').toUpperCase(),
      d.presenca  || ''
    ]);

    pdf.autoTable({
      startY: 80,
      head,
      body,
      styles: {
        font:        'helvetica',
        fontSize:    8,
        cellPadding: { top: 4, bottom: 4, left: 4, right: 4 },
        overflow:    'hidden',
        halign:      'left',   // padrão: tudo alinhado à esquerda
        valign:      'middle',
      },
      headStyles: {
        fillColor:  [25, 25, 25],
        textColor:  [212, 175, 85],
        fontStyle:  'bold',
        fontSize:   7.5,
        halign:     'left',    // cabeçalhos também à esquerda — corrige o "Per." deslocado
        valign:     'middle',
        cellPadding:{ top: 5, bottom: 5, left: 4, right: 4 },
      },
      alternateRowStyles: { fillColor: [246, 246, 246] },
      // Larguras calibradas para caber em 770 pt úteis (margens 36+36)
      columnStyles: {
        0:  { cellWidth: 20,  halign: 'center' },  // #
        1:  { cellWidth: 148 },                    // Nome
        2:  { cellWidth: 70  },                    // Matrícula
        3:  { cellWidth: 142 },                    // E-mail
        4:  { cellWidth: 74  },                    // Telefone
        5:  { cellWidth: 88  },                    // Curso
        6:  { cellWidth: 26,  halign: 'left'   },  // Per. — esquerda, compacto
        7:  { cellWidth: 62  },                    // Vínculo
        8:  { cellWidth: 56  },                    // Status
        9:  { cellWidth: 26,  halign: 'center' },  // HC
        10: { cellWidth: 58,  halign: 'center',    // Presença
              fillColor: [240, 255, 244] },
      },
      margin:     { left: 36, right: 36 },
      tableWidth: 'wrap',
      // Cor dinâmica na coluna de presença
      didParseCell: function(data) {
        if (data.column.index === 10 && data.section === 'body') {
          const val = String(data.cell.raw || '');
          if (val === 'SIM') {
            data.cell.styles.textColor  = [20, 120, 50];
            data.cell.styles.fontStyle  = 'bold';
            data.cell.styles.fillColor  = [215, 255, 225];
          } else if (val === 'NÃO') {
            data.cell.styles.textColor  = [190, 40, 40];
            data.cell.styles.fontStyle  = 'bold';
            data.cell.styles.fillColor  = [255, 235, 235];
          }
        }
      },
    });

    const pageCount = pdf.internal.getNumberOfPages();
    for (let p = 1; p <= pageCount; p++) {
      pdf.setPage(p);
      pdf.setFontSize(7.5);
      pdf.setTextColor(160);
      pdf.text(
        `Total: ${lista.length} registro(s)   |   Pagina ${p} de ${pageCount}`,
        36,
        pdf.internal.pageSize.getHeight() - 18
      );
    }

    const nomeArq = titulo.replace(/\s+/g,'_').replace(/[^a-zA-Z0-9_]/g,'') + '.pdf';
    pdf.save(nomeArq);
  }

  // PDF — Todos
  document.getElementById('pdfTodosBtn').addEventListener('click', () => {
    if (!todosInscritos.length) { alert('Nenhum inscrito para exportar.'); return; }
    const lista = [...todosInscritos].sort((a, b) =>
      (a.nome||'').localeCompare(b.nome||'', 'pt-BR', { sensitivity: 'base' })
    );
    gerarPDF(lista, 'Lista Completa de Inscritos');
  });

  // PDF — Somente HC
  document.getElementById('pdfHCBtn').addEventListener('click', () => {
    const comHC = todosInscritos
      .filter(i => (i.horas_complementares||'').toUpperCase() === 'SIM')
      .sort((a, b) => (a.nome||'').localeCompare(b.nome||'', 'pt-BR', { sensitivity: 'base' }));
    if (!comHC.length) { alert('Nenhum inscrito com Horas Complementares confirmadas.'); return; }
    gerarPDF(comHC, 'Inscritos_HC_SIM');
  });

  // ── gerar Excel ────────────────────────────────────────────────────────────
  function gerarExcel(lista, titulo, nomeArquivo) {
    const XLSX = window.XLSX;

    const enriched = listaComPresenca(lista);

    const cabecalho = [
      '#', 'Nome', 'Matrícula', 'E-mail', 'Telefone',
      'Curso', 'Período', 'Vínculo', 'HC', 'Presença ✓'
    ];

    const linhas = enriched.map((d, i) => [
      i + 1,
      d.nome      || '',
      d.matricula || '',
      d.email     || '',
      d.telefone  || '',
      d.curso     || '',
      d.periodo   || '',
      d.vinculo   || '',
      (d.horas_complementares || 'NÃO').toUpperCase(),
      d.presenca  || ''
    ]);

    const wsData = [cabecalho, ...linhas];
    const ws = XLSX.utils.aoa_to_sheet(wsData);

    ws['!cols'] = [
      { wch: 5  },  // #
      { wch: 36 },  // Nome
      { wch: 16 },  // Matrícula
      { wch: 36 },  // E-mail
      { wch: 18 },  // Telefone
      { wch: 30 },  // Curso
      { wch: 8  },  // Período
      { wch: 20 },  // Vínculo
      { wch: 8  },  // HC
      { wch: 16 },  // Presença
    ];

    const headerStyle = {
      font:      { bold: true, color: { rgb: 'D4AF55' }, name: 'Arial', sz: 10 },
      fill:      { fgColor: { rgb: '1E1E1E' }, patternType: 'solid' },
      alignment: { horizontal: 'center', vertical: 'center', wrapText: true },
      border:    { bottom: { style: 'medium', color: { rgb: 'D4AF55' } } }
    };
    cabecalho.forEach((_, colIdx) => {
      const addr = XLSX.utils.encode_cell({ r: 0, c: colIdx });
      if (ws[addr]) ws[addr].s = headerStyle;
    });

    for (let r = 1; r <= linhas.length; r++) {
      const par    = r % 2 === 1;
      const bgBase = par ? 'FFFFFF' : 'F5F5F5';

      for (let c = 0; c < cabecalho.length; c++) {
        const addr = XLSX.utils.encode_cell({ r, c });
        if (!ws[addr]) ws[addr] = { t: 's', v: '' };

        if (c === 9) {
          const val = ws[addr].v;
          let bg = 'F0FFF4', fc = '555555', bold = false;
          if (val === 'SIM') { bg = 'D7FFE1'; fc = '14783A'; bold = true; }
          if (val === 'NÃO') { bg = 'FFEBEB'; fc = 'BE2828'; bold = true; }
          ws[addr].s = {
            font:      { name: 'Arial', sz: 10, bold, color: { rgb: fc } },
            fill:      { fgColor: { rgb: bg }, patternType: 'solid' },
            alignment: { horizontal: 'center', vertical: 'center' },
            border: {
              left:  { style: 'medium', color: { rgb: '8FF0A4' } },
              right: { style: 'thin',   color: { rgb: '8FF0A4' } },
            }
          };
        } else {
          ws[addr].s = {
            font:      { name: 'Arial', sz: 10 },
            fill:      { fgColor: { rgb: bgBase }, patternType: 'solid' },
            alignment: { vertical: 'center' },
          };
        }
      }
    }

    ws['!freeze']     = { xSplit: 0, ySplit: 1, topLeftCell: 'A2', activePane: 'bottomLeft' };
    ws['!autofilter'] = { ref: `A1:J${linhas.length + 1}` };

    const wsInfo = XLSX.utils.aoa_to_sheet([
      ['Instruções de uso'],
      [''],
      ['• Use os filtros do Excel (seta nos cabeçalhos) para filtrar por curso, vínculo ou HC.'],
      ['• A coluna "Presença ✓" reflete o que foi marcado no painel antes da exportação.'],
      ['• Você pode editar a coluna de presença diretamente na planilha durante o evento.'],
      ['• Gerado em: ' + new Date().toLocaleString('pt-BR')],
      ['• Total de registros: ' + lista.length],
    ]);
    wsInfo['!cols'] = [{ wch: 80 }];

    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws,     'Inscritos');
    XLSX.utils.book_append_sheet(wb, wsInfo, 'Instruções');

    XLSX.writeFile(wb, nomeArquivo);
  }

  // Excel — Todos
  document.getElementById('xlsTodosBtn').addEventListener('click', () => {
    if (!todosInscritos.length) { alert('Nenhum inscrito para exportar.'); return; }
    const lista = [...todosInscritos].sort((a, b) =>
      (a.nome||'').localeCompare(b.nome||'', 'pt-BR', { sensitivity: 'base' })
    );
    gerarExcel(lista, 'Lista Completa de Inscritos', 'Inscritos_Todos.xlsx');
  });

  // Excel — Somente HC
  document.getElementById('xlsHCBtn').addEventListener('click', () => {
    const comHC = todosInscritos
      .filter(i => (i.horas_complementares||'').toUpperCase() === 'SIM')
      .sort((a, b) => (a.nome||'').localeCompare(b.nome||'', 'pt-BR', { sensitivity: 'base' }));
    if (!comHC.length) { alert('Nenhum inscrito com Horas Complementares confirmadas.'); return; }
    gerarExcel(comHC, 'Inscritos com HC', 'Inscritos_HC.xlsx');
  });

  // ── liberar horas / inscrições ─────────────────────────────────────────────
  document.getElementById('liberarHorasBtn').addEventListener('click', async () => {
    try {
      await updateDoc(doc(db, 'configuracoes', 'painel'), { horasLiberadas: true });
      atualizarModoVisual(true);
      alert('Modo de horas complementares ativado.');
    } catch (err) { console.error(err); alert('Erro ao liberar horas.'); }
  });

  document.getElementById('liberarInscricoesBtn').addEventListener('click', async () => {
    try {
      await updateDoc(doc(db, 'configuracoes', 'painel'), { horasLiberadas: false });
      atualizarModoVisual(false);
      alert('Modo inscrições ativado novamente.');
    } catch (err) { console.error(err); alert('Erro ao liberar inscrições.'); }
  });

  // ── alterar senha ──────────────────────────────────────────────────────────
  document.getElementById('alterarSenhaBtn').addEventListener('click', async () => {
    const novaSenha = prompt('Digite a nova senha:');
    if (!novaSenha) return;
    try {
      await updateDoc(doc(db, 'configuracoes', 'painel'), { senha: novaSenha });
      alert('Senha alterada com sucesso.');
    } catch (err) { console.error(err); alert('Erro ao alterar senha.'); }
  });

  // ── inicializar ────────────────────────────────────────────────────────────
  await inicializarConfiguracoes();
  await carregarInscritos();
</script>
</body>
