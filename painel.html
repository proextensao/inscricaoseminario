<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Painel de Controle — Seminário</title>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, getDoc, updateDoc, setDoc, query, orderBy }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA0iyMTBLvtvgb9ndrqOrZWTMH8bDXzqj0",
      authDomain: "projetos-de-extensao.firebaseapp.com",
      projectId: "projetos-de-extensao",
      storageBucket: "projetos-de-extensao.firebasestorage.app",
      messagingSenderId: "42869327067",
      appId: "1:42869327067:web:84d72c5db659990934b8fe"
    };

    const app = initializeApp(firebaseConfig);
    const db  = getFirestore(app);
    window.db = db;
    window._fb = { collection, getDocs, doc, getDoc, updateDoc, setDoc, query, orderBy };
  </script>

  <!-- SheetJS para Excel -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <!-- jsPDF para PDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --bg:#0d0d0d; --surface:#141414; --surface2:#1c1c1c;
      --border:rgba(255,255,255,0.08); --border-active:rgba(212,175,85,0.6);
      --gold:#d4af55; --gold-light:#e8cc7a;
      --text:#f0ece4; --text-muted:rgba(240,236,228,0.45);
      --error:#e05c5c; --success:#8ff0a4;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;min-height:100vh;padding:40px 24px;}
    body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(212,175,85,0.06) 0%,transparent 60%);pointer-events:none;}

    h1{font-family:'Cormorant Garamond',serif;font-size:3.2rem;font-weight:300;color:var(--text);margin-bottom:6px;}
    .subtitle{font-size:11px;color:var(--text-muted);letter-spacing:0.1em;margin-bottom:32px;}

    /* MODO BADGE */
    .modo-badge{display:inline-flex;align-items:center;gap:8px;font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold);border:1px solid rgba(212,175,85,0.25);padding:6px 14px;border-radius:4px;margin-bottom:28px;}
    .modo-dot{width:8px;height:8px;border-radius:50%;background:var(--gold);box-shadow:0 0 6px var(--gold);}

    /* STATS ROW */
    .stats-row{display:flex;gap:20px;align-items:stretch;margin-bottom:28px;flex-wrap:wrap;}
    .stat-big{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:20px 28px;min-width:140px;}
    .stat-big .stat-lbl{font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:var(--text-muted);margin-bottom:6px;}
    .stat-big .stat-num{font-family:'Cormorant Garamond',serif;font-size:3rem;color:var(--gold);line-height:1;}

    /* BOTÕES AÇÃO */
    .action-btns{display:flex;gap:10px;flex-wrap:wrap;align-items:center;flex:1;}
    .btn{padding:10px 18px;border-radius:4px;cursor:pointer;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.18em;text-transform:uppercase;transition:.2s;border:1px solid transparent;}
    .btn-liberar-horas{background:transparent;color:var(--gold);border-color:rgba(212,175,85,0.4);}
    .btn-liberar-horas:hover{background:rgba(212,175,85,0.08);}
    .btn-liberar-horas.ativo{background:rgba(212,175,85,0.15);border-color:var(--gold);}
    .btn-liberar-inscricoes{background:transparent;color:var(--error);border-color:rgba(224,92,92,0.4);}
    .btn-liberar-inscricoes:hover{background:rgba(224,92,92,0.08);}
    .btn-liberar-inscricoes.ativo{background:rgba(224,92,92,0.12);border-color:var(--error);}
    .btn-pdf{background:transparent;color:#5ba8d4;border-color:rgba(91,168,212,0.4);}
    .btn-pdf:hover{background:rgba(91,168,212,0.08);}
    .btn-excel{background:transparent;color:#5bd48a;border-color:rgba(91,212,138,0.4);}
    .btn-excel:hover{background:rgba(91,212,138,0.08);}
    .btn-alterar-senha{background:transparent;color:var(--text-muted);border-color:rgba(255,255,255,0.15);}
    .btn-alterar-senha:hover{background:rgba(255,255,255,0.04);}
    .btn-voltar{background:transparent;color:var(--text-muted);border-color:rgba(255,255,255,0.15);}
    .btn-voltar:hover{background:rgba(255,255,255,0.04);}

    .btn-row-top{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px;}
    .btn-row-bottom{display:flex;gap:10px;flex-wrap:wrap;}

    /* FILTROS */
    .filter-bar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center;}
    .filter-bar-label{font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:var(--text-muted);margin-right:4px;}
    .filter-bar input,.filter-bar select{
      background:var(--surface);border:1px solid var(--border);color:var(--text);
      padding:8px 12px;border-radius:4px;font-family:'DM Mono',monospace;font-size:10px;outline:none;
    }
    .filter-bar input{width:200px;}
    .filter-bar input:focus,.filter-bar select:focus{border-color:var(--border-active);}
    .btn-limpar{background:transparent;color:var(--text-muted);border:1px solid rgba(255,255,255,0.1);padding:8px 14px;border-radius:4px;cursor:pointer;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.15em;text-transform:uppercase;}
    .btn-limpar:hover{background:rgba(255,255,255,0.04);}

    .exibindo{font-size:10px;color:var(--text-muted);letter-spacing:0.08em;margin-bottom:10px;}

    /* TABELA */
    .table-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:8px;}
    table{width:100%;border-collapse:collapse;font-size:11px;min-width:1000px;}
    thead{background:rgba(212,175,85,0.07);}
    th{
      padding:12px 14px;text-align:left;font-size:9px;letter-spacing:0.2em;
      text-transform:uppercase;color:var(--gold);border-bottom:1px solid rgba(212,175,85,0.15);
      white-space:nowrap;cursor:pointer;user-select:none;
    }
    th:hover{color:var(--gold-light);}
    th .sort-arrow{opacity:0.4;margin-left:4px;font-size:8px;}
    th.sorted .sort-arrow{opacity:1;}
    td{padding:11px 14px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle;}
    tr:last-child td{border-bottom:none;}
    tr:hover td{background:rgba(255,255,255,0.015);}

    /* BADGES */
    .badge{display:inline-block;padding:2px 8px;border-radius:3px;font-size:9px;letter-spacing:0.1em;text-transform:uppercase;}
    .badge-sim{background:rgba(143,240,164,0.12);color:var(--success);border:1px solid rgba(143,240,164,0.25);}
    .badge-nao{background:rgba(224,92,92,0.1);color:var(--error);border:1px solid rgba(224,92,92,0.2);}
    .badge-quiz{background:rgba(212,175,85,0.1);color:var(--gold);border:1px solid rgba(212,175,85,0.2);}
    .badge-empty{background:rgba(255,255,255,0.04);color:var(--text-muted);border:1px solid rgba(255,255,255,0.08);}

    /* PRESENÇA SELECT EDITÁVEL */
    .presenca-select{
      background:var(--surface2);border:1px solid var(--border);color:var(--text);
      padding:4px 8px;border-radius:3px;font-family:'DM Mono',monospace;font-size:10px;
      cursor:pointer;outline:none;transition:.2s;
    }
    .presenca-select:focus{border-color:var(--border-active);}
    .presenca-select.sim{border-color:rgba(143,240,164,0.35);color:var(--success);}
    .presenca-select.nao{border-color:rgba(224,92,92,0.25);color:var(--error);}

    .loading{text-align:center;padding:40px;color:var(--text-muted);font-size:11px;letter-spacing:0.1em;}
    .empty{text-align:center;padding:40px;color:var(--text-muted);}

    /* TOAST */
    .toast{position:fixed;bottom:32px;right:32px;background:var(--gold);color:#000;padding:14px 24px;border-radius:6px;font-size:12px;letter-spacing:0.1em;opacity:0;transition:.3s;z-index:999;pointer-events:none;}
    .toast.show{opacity:1;}

    /* MODAL SENHA */
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:500;align-items:center;justify-content:center;}
    .modal-overlay.visible{display:flex;}
    .modal-box{background:var(--surface);border:1px solid rgba(212,175,85,0.3);border-radius:10px;padding:36px;width:340px;}
    .modal-title{font-family:'Cormorant Garamond',serif;font-size:1.8rem;color:var(--gold);margin-bottom:20px;}
    .modal-box input{
      background:var(--surface2);border:1px solid var(--border);color:var(--text);
      padding:12px 14px;border-radius:4px;font-family:'DM Mono',monospace;font-size:11px;
      width:100%;outline:none;margin-bottom:12px;
    }
    .modal-box input:focus{border-color:var(--border-active);}
    .modal-actions{display:flex;gap:10px;margin-top:8px;}
    .btn-modal-confirm{background:var(--gold);color:#000;border:none;padding:11px 22px;border-radius:3px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.15em;text-transform:uppercase;cursor:pointer;}
    .btn-modal-confirm:hover{background:var(--gold-light);}
    .btn-modal-cancel{background:transparent;color:var(--text-muted);border:1px solid rgba(255,255,255,0.12);padding:11px 18px;border-radius:3px;font-family:'DM Mono',monospace;font-size:10px;cursor:pointer;}
    .modal-msg{font-size:10px;color:var(--error);margin-top:8px;min-height:16px;}

    @media(max-width:640px){
      h1{font-size:2.2rem;}
      .stats-row{flex-direction:column;}
    }
  </style>
</head>
<body>

<h1>Painel de Controle</h1>
<p class="subtitle">Lista de inscritos do seminário</p>

<div class="modo-badge" id="modoBadge">
  <span class="modo-dot"></span>
  <span id="modoTexto">MODO INSCRIÇÕES ATIVO</span>
</div>

<!-- STATS + BOTÕES -->
<div class="stats-row">
  <div class="stat-big">
    <div class="stat-lbl">Total de inscritos</div>
    <div class="stat-num" id="statTotal">0</div>
  </div>
  <div style="display:flex;flex-direction:column;justify-content:space-between;gap:10px;flex:1;">
    <div class="btn-row-top">
      <button class="btn btn-liberar-horas"       id="btnLiberarHoras">LIBERAR HORAS COMPLEMENTARES</button>
      <button class="btn btn-liberar-inscricoes"  id="btnLiberarInscricoes">LIBERAR INSCRIÇÕES</button>
      <button class="btn btn-pdf"                 id="exportPdfTodosBtn">PDF — TODOS</button>
      <button class="btn btn-pdf"                 id="exportPdfHcBtn">PDF — SOMENTE HC</button>
      <button class="btn btn-excel"               id="exportExcelTodosBtn">EXCEL — TODOS</button>
      <button class="btn btn-excel"               id="exportExcelHcBtn">EXCEL — SOMENTE HC</button>
    </div>
    <div class="btn-row-bottom">
      <button class="btn btn-alterar-senha" id="alterarSenhaBtn">ALTERAR SENHA</button>
      <button class="btn btn-voltar"        id="voltarBtn">VOLTAR</button>
    </div>
  </div>
</div>

<!-- FILTROS -->
<div class="filter-bar">
  <span class="filter-bar-label">Buscar nome / e-mail</span>
  <input type="text" id="searchInput" placeholder="Digite para filtrar…">

  <select id="filterCurso"><option value="">Todos os cursos</option></select>
  <select id="filterVinculo"><option value="">Todos</option></select>
  <select id="filterHC">
    <option value="">Todos</option>
    <option value="SIM">Com HC</option>
    <option value="NÃO">Sem HC</option>
  </select>

  <button class="btn-limpar" id="limparFiltrosBtn">LIMPAR FILTROS</button>
</div>

<div class="exibindo" id="exibindoLabel">Exibindo 0 de 0 inscrito(s)</div>

<!-- TABELA -->
<div class="table-wrap">
  <table id="mainTable">
    <thead>
      <tr>
        <th data-col="idx">#&nbsp;<span class="sort-arrow">↕</span></th>
        <th data-col="nome">NOME&nbsp;<span class="sort-arrow">↕</span></th>
        <th data-col="matricula">MATRÍCULA&nbsp;<span class="sort-arrow">↕</span></th>
        <th data-col="email">E-MAIL&nbsp;<span class="sort-arrow">↕</span></th>
        <th data-col="telefone">TELEFONE&nbsp;<span class="sort-arrow">↕</span></th>
        <th data-col="curso">CURSO&nbsp;<span class="sort-arrow">↕</span></th>
        <th data-col="periodo">PERÍODO&nbsp;<span class="sort-arrow">↕</span></th>
        <th data-col="vinculo">VÍNCULO&nbsp;<span class="sort-arrow">↕</span></th>
        <th data-col="hc" style="text-align:center">HC&nbsp;<span class="sort-arrow">↕</span></th>
        <th data-col="acertos" style="text-align:center">ACERTOS QUEST.&nbsp;<span class="sort-arrow">↕</span></th>
        <th style="text-align:center">PRESENÇA</th>
      </tr>
    </thead>
    <tbody id="tableBody">
      <tr><td colspan="11" class="loading">Carregando dados…</td></tr>
    </tbody>
  </table>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- MODAL ALTERAR SENHA -->
<div class="modal-overlay" id="modalSenha">
  <div class="modal-box">
    <div class="modal-title">Alterar Senha</div>
    <input type="password" id="senhaAtual"   placeholder="Senha atual">
    <input type="password" id="senhaNova"    placeholder="Nova senha">
    <input type="password" id="senhaConfirm" placeholder="Confirmar nova senha">
    <div class="modal-msg" id="modalMsg"></div>
    <div class="modal-actions">
      <button class="btn-modal-confirm" id="confirmarSenhaBtn">Salvar</button>
      <button class="btn-modal-cancel"  id="cancelarSenhaBtn">Cancelar</button>
    </div>
  </div>
</div>

<!-- ══════════════════════ SCRIPTS ══════════════════════ -->
<script type="module">
  const { collection, getDocs, doc, getDoc, updateDoc, setDoc } = window._fb;
  const db = window.db;

  let todosInscritos = [];
  let sortCol = 'idx';
  let sortAsc = true;

  // ── AUTH ───────────────────────────────────────────────────────────────────
  if (sessionStorage.getItem('painelAutorizado') !== 'true') {
    window.location.href = 'seminario-extensao.html';
  }

  // ── TOAST ──────────────────────────────────────────────────────────────────
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  // ── CALCULAR HORAS QUIZ ────────────────────────────────────────────────────
  function calcHorasQuiz(acertos) {
    const n = parseInt(acertos) || 0;
    if (n === 12) return 20;
    if (n >= 10)  return 10;
    if (n >= 5)   return 5;
    return 0;
  }

  // ── CALCULAR TOTAL HORAS ───────────────────────────────────────────────────
  // HC = 5h automáticas (se hc_registrado === 'SIM') + horas do questionário
  function calcTotalHoras(inscrito) {
    const base = inscrito.hc_registrado === 'SIM' ? 5 : 0;
    const quiz = calcHorasQuiz(inscrito.acertos_questionario);
    return base + quiz;
  }

  // ── CARREGAR CONFIG ────────────────────────────────────────────────────────
  async function carregarConfig() {
    try {
      const ref  = doc(db, 'configuracoes', 'painel');
      const snap = await getDoc(ref);
      if (!snap.exists()) {
        await setDoc(ref, { horasLiberadas: false, quizLiberado: false, senha: 'admin123' });
      }
      const dados = snap.exists() ? snap.data() : { horasLiberadas: false, quizLiberado: false };
      atualizarBtnHoras(!!dados.horasLiberadas);
      atualizarBtnInscricoes(!!dados.horasLiberadas);
      atualizarModoBadge(!!dados.horasLiberadas);
    } catch (err) { console.error(err); }
  }

  function atualizarModoBadge(horasLiberadas) {
    const badge = document.getElementById('modoTexto');
    const dot   = document.querySelector('.modo-dot');
    if (horasLiberadas) {
      badge.textContent = 'MODO HORAS COMPLEMENTARES ATIVO';
      dot.style.background = '#8ff0a4';
      dot.style.boxShadow  = '0 0 6px #8ff0a4';
    } else {
      badge.textContent = 'MODO INSCRIÇÕES ATIVO';
      dot.style.background = 'var(--gold)';
      dot.style.boxShadow  = '0 0 6px var(--gold)';
    }
  }

  function atualizarBtnHoras(ativo) {
    const btn = document.getElementById('btnLiberarHoras');
    btn.textContent = ativo ? 'BLOQUEAR HORAS COMPLEMENTARES' : 'LIBERAR HORAS COMPLEMENTARES';
    btn.classList.toggle('ativo', ativo);
  }

  function atualizarBtnInscricoes(horasAtivo) {
    const btn = document.getElementById('btnLiberarInscricoes');
    btn.textContent = horasAtivo ? 'LIBERAR INSCRIÇÕES' : 'BLOQUEAR INSCRIÇÕES';
  }

  // ── TOGGLE HORAS ──────────────────────────────────────────────────────────
  document.getElementById('btnLiberarHoras').addEventListener('click', async () => {
    try {
      const ref  = doc(db, 'configuracoes', 'painel');
      const snap = await getDoc(ref);
      const atual = snap.exists() ? !!snap.data().horasLiberadas : false;
      const novo  = !atual;
      await setDoc(ref, { horasLiberadas: novo }, { merge: true });
      atualizarBtnHoras(novo);
      atualizarBtnInscricoes(novo);
      atualizarModoBadge(novo);
      showToast(novo ? 'Horas complementares liberadas!' : 'Horas complementares bloqueadas.');
    } catch (err) { console.error(err); }
  });

  // ── TOGGLE INSCRIÇÕES ─────────────────────────────────────────────────────
  document.getElementById('btnLiberarInscricoes').addEventListener('click', async () => {
    try {
      const ref  = doc(db, 'configuracoes', 'painel');
      const snap = await getDoc(ref);
      const horasAtivo = snap.exists() ? !!snap.data().horasLiberadas : false;
      // Botão inverte o estado atual de horas
      const novo = !horasAtivo;
      await setDoc(ref, { horasLiberadas: novo }, { merge: true });
      atualizarBtnHoras(novo);
      atualizarBtnInscricoes(novo);
      atualizarModoBadge(novo);
      showToast(novo ? 'Modo horas ativo — inscrições bloqueadas.' : 'Modo inscrições ativo.');
    } catch (err) { console.error(err); }
  });

  // ── CARREGAR INSCRITOS ────────────────────────────────────────────────────
  async function carregarInscritos() {
    try {
      const snap = await getDocs(collection(db, 'inscricoes'));
      todosInscritos = [];
      snap.forEach(d => todosInscritos.push({ id: d.id, ...d.data() }));
      document.getElementById('statTotal').textContent = todosInscritos.length;
      popularFiltrosCurso();
      popularFiltrosVinculo();
      aplicarFiltros();
    } catch (err) {
      console.error(err);
      document.getElementById('tableBody').innerHTML =
        '<tr><td colspan="11" class="empty">Erro ao carregar dados.</td></tr>';
    }
  }

  // ── POPULAR FILTROS ────────────────────────────────────────────────────────
  function popularFiltrosCurso() {
    const sel    = document.getElementById('filterCurso');
    const atual  = sel.value;
    const cursos = [...new Set(todosInscritos.map(i => i.curso).filter(Boolean))].sort();
    sel.innerHTML = '<option value="">Todos os cursos</option>' +
      cursos.map(c => `<option value="${c}"${c===atual?' selected':''}>${c}</option>`).join('');
  }

  function popularFiltrosVinculo() {
    const sel     = document.getElementById('filterVinculo');
    const atual   = sel.value;
    const vinculos = [...new Set(todosInscritos.map(i => i.vinculo).filter(Boolean))].sort();
    sel.innerHTML = '<option value="">Todos</option>' +
      vinculos.map(v => `<option value="${v}"${v===atual?' selected':''}>${v}</option>`).join('');
  }

  // ── RENDER TABELA ──────────────────────────────────────────────────────────
  function renderTabela(lista) {
    const tbody = document.getElementById('tableBody');
    document.getElementById('exibindoLabel').textContent =
      `Exibindo ${lista.length} de ${todosInscritos.length} inscrito(s)`;

    if (!lista.length) {
      tbody.innerHTML = '<tr><td colspan="11" class="empty">Nenhum inscrito encontrado.</td></tr>';
      return;
    }

    tbody.innerHTML = lista.map((inscrito, idx) => {
      const totalHoras = calcTotalHoras(inscrito);
      const temAcertos = inscrito.acertos_questionario !== null &&
                         inscrito.acertos_questionario !== undefined &&
                         inscrito.acertos_questionario !== '';
      const acertosNum = temAcertos ? parseInt(inscrito.acertos_questionario) || 0 : null;
      const pct        = temAcertos ? Math.round((acertosNum / 12) * 100) : null;

      // Horas totais na coluna HC
      let hcDisplay;
      if (totalHoras > 0) {
        hcDisplay = `<span style="font-family:'Cormorant Garamond',serif;font-size:1.15rem;color:var(--gold-light);font-weight:400;">${totalHoras}h</span>`;
      } else {
        hcDisplay = `<span class="badge badge-empty">0h</span>`;
      }

      // Acertos
      let acertosDisplay;
      if (temAcertos) {
        acertosDisplay = `
          <span class="badge badge-quiz" style="font-size:10px;">
            ${acertosNum}/12
          </span>
          <span style="font-size:9px;color:var(--text-muted);margin-left:4px;">${pct}%</span>`;
      } else {
        acertosDisplay = `<span class="badge badge-empty">—</span>`;
      }

      return `<tr>
        <td style="color:var(--text-muted);font-size:10px;">${idx + 1}</td>
        <td><strong style="font-size:11px;">${inscrito.nome || '—'}</strong></td>
        <td style="color:var(--text-muted);font-size:10px;">${inscrito.matricula || '—'}</td>
        <td style="color:var(--text-muted);font-size:10px;">${inscrito.email || '—'}</td>
        <td style="font-size:10px;">${inscrito.telefone || '—'}</td>
        <td style="font-size:10px;">${inscrito.curso || '—'}</td>
        <td style="text-align:center;font-size:10px;">${inscrito.periodo || '—'}</td>
        <td style="font-size:10px;">${inscrito.vinculo || '—'}</td>
        <td style="text-align:center;">${hcDisplay}</td>
        <td style="text-align:center;">${acertosDisplay}</td>
        <td style="text-align:center;">
          <select class="presenca-select ${inscrito.presenca === 'SIM' ? 'sim' : 'nao'}"
                  data-id="${inscrito.id}"
                  onchange="window.atualizarPresenca(this)">
            <option value="SIM" ${inscrito.presenca === 'SIM' ? 'selected' : ''}>SIM</option>
            <option value="NÃO" ${inscrito.presenca !== 'SIM' ? 'selected' : ''}>NÃO</option>
          </select>
        </td>
      </tr>`;
    }).join('');
  }

  // ── ATUALIZAR PRESENÇA (EDITÁVEL) — apenas controle de recepção ──────────
  window.atualizarPresenca = async function(select) {
    const id  = select.dataset.id;
    const val = select.value;
    select.classList.toggle('sim', val === 'SIM');
    select.classList.toggle('nao', val === 'NÃO');
    try {
      await updateDoc(doc(db, 'inscricoes', id), { presenca: val });
      // Atualizar local
      const inscrito = todosInscritos.find(i => i.id === id);
      if (inscrito) inscrito.presenca = val;
      showToast(`Presença atualizada para ${val}.`);
    } catch (err) {
      console.error(err);
      showToast('Erro ao atualizar presença.');
    }
  };

  // ── FILTROS ────────────────────────────────────────────────────────────────
  function aplicarFiltros() {
    const busca   = document.getElementById('searchInput').value.toLowerCase();
    const curso   = document.getElementById('filterCurso').value;
    const vinculo = document.getElementById('filterVinculo').value;
    const hc      = document.getElementById('filterHC').value;

    let lista = [...todosInscritos];

    if (busca) {
      lista = lista.filter(i =>
        (i.nome      || '').toLowerCase().includes(busca) ||
        (i.email     || '').toLowerCase().includes(busca) ||
        (i.matricula || '').toLowerCase().includes(busca)
      );
    }
    if (curso)   lista = lista.filter(i => i.curso   === curso);
    if (vinculo) lista = lista.filter(i => i.vinculo === vinculo);
    if (hc)      lista = lista.filter(i => (hc === 'SIM' ? i.hc_registrado === 'SIM' : i.hc_registrado !== 'SIM'));

    // Ordenação
    lista.sort((a, b) => {
      let va, vb;
      if (sortCol === 'idx')      { va = todosInscritos.indexOf(a); vb = todosInscritos.indexOf(b); }
      else if (sortCol === 'hc')  { va = calcTotalHoras(a); vb = calcTotalHoras(b); }
      else if (sortCol === 'acertos') {
        va = parseInt(a.acertos_questionario) || -1;
        vb = parseInt(b.acertos_questionario) || -1;
      }
      else { va = (a[sortCol] || '').toString().toLowerCase(); vb = (b[sortCol] || '').toString().toLowerCase(); }
      if (va < vb) return sortAsc ? -1 : 1;
      if (va > vb) return sortAsc ? 1 : -1;
      return 0;
    });

    renderTabela(lista);
  }

  // ── SORT ───────────────────────────────────────────────────────────────────
  document.querySelectorAll('th[data-col]').forEach(th => {
    th.addEventListener('click', () => {
      const col = th.dataset.col;
      if (sortCol === col) sortAsc = !sortAsc;
      else { sortCol = col; sortAsc = true; }
      document.querySelectorAll('th').forEach(t => t.classList.remove('sorted'));
      th.classList.add('sorted');
      th.querySelector('.sort-arrow').textContent = sortAsc ? '↑' : '↓';
      aplicarFiltros();
    });
  });

  ['searchInput','filterCurso','filterVinculo','filterHC'].forEach(id => {
    document.getElementById(id).addEventListener('input',  aplicarFiltros);
    document.getElementById(id).addEventListener('change', aplicarFiltros);
  });

  document.getElementById('limparFiltrosBtn').addEventListener('click', () => {
    document.getElementById('searchInput').value   = '';
    document.getElementById('filterCurso').value   = '';
    document.getElementById('filterVinculo').value = '';
    document.getElementById('filterHC').value      = '';
    aplicarFiltros();
  });

  // ── HELPER LINHAS EXPORT ──────────────────────────────────────────────────
  function linhasExport(lista) {
    return lista.map((i, idx) => {
      const totalHoras  = calcTotalHoras(i);
      const temAcertos  = i.acertos_questionario !== null &&
                          i.acertos_questionario !== undefined &&
                          i.acertos_questionario !== '';
      const acertosNum  = temAcertos ? parseInt(i.acertos_questionario) || 0 : null;
      const pct         = temAcertos ? Math.round((acertosNum / 12) * 100) + '%' : '—';
      const presencaVal = i.presenca === 'SIM' ? 'SIM' : 'NÃO';
      return {
        '#':                    idx + 1,
        'Nome':                 i.nome       || '',
        'Matrícula':            i.matricula  || '',
        'E-mail':               i.email      || '',
        'Telefone':             i.telefone   || '',
        'Curso':                i.curso      || '',
        'Período':              i.periodo    || '',
        'Vínculo':              i.vinculo    || '',
        'HC (Total Horas)':     `${totalHoras}h`,
        'Acertos Questionário': temAcertos ? `${acertosNum}/12 (${pct})` : '—',
        'Presença':             presencaVal
      };
    });
  }

  function colunasExportPdf() {
    return ['#','Nome','Matrícula','E-mail','Telefone','Curso','Per.','Vínculo','HC (Horas)','Acertos Quest.','Presença'];
  }

  function linhasExportPdf(lista) {
    return lista.map((i, idx) => {
      const totalHoras  = calcTotalHoras(i);
      const presencaVal = i.presenca === 'SIM' ? 'SIM' : 'NÃO';
      const temAcertos  = i.acertos_questionario !== null &&
                          i.acertos_questionario !== undefined &&
                          i.acertos_questionario !== '';
      const acertosNum  = temAcertos ? parseInt(i.acertos_questionario) || 0 : null;
      const pct         = temAcertos ? Math.round((acertosNum / 12) * 100) + '%' : '';
      return [
        idx + 1,
        i.nome       || '',
        i.matricula  || '',
        i.email      || '',
        i.telefone   || '',
        i.curso      || '',
        i.periodo    || '',
        i.vinculo    || '',
        `${totalHoras}h`,
        temAcertos ? `${acertosNum}/12 (${pct})` : '—',
        presencaVal
      ];
    });
  }

  function gerarPdf(lista, titulo) {
    // 1. Ordenar a lista alfabeticamente pelo nome antes de exportar
    const listaOrdenada = [...lista].sort((a, b) => 
      (a.nome || '').localeCompare(b.nome || '', 'pt-BR', { sensitivity: 'base' })
    );

    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a3' });
    
    // Cabeçalho do Documento
    pdf.setFont('helvetica','bold');
    pdf.setFontSize(16);
    pdf.setTextColor(212, 175, 85);
    pdf.text('Seminário de Extensão — 3° Período', 14, 18);
    pdf.setFont('helvetica','normal');
    pdf.setFontSize(9);
    pdf.setTextColor(100, 100, 100); // Texto cinzento escuro para o subtítulo
    pdf.text(`${titulo} · Gerado em: ${new Date().toLocaleString('pt-BR')} · Total: ${listaOrdenada.length} registro(s)`, 14, 26);

    pdf.autoTable({
      head:       [colunasExportPdf()],
      body:       linhasExportPdf(listaOrdenada), // Utiliza a lista já ordenada
      startY:     32,
      styles:     { fontSize: 7.5, cellPadding: 3, font: 'helvetica' },
      
      // 2. Cores claras corrigidas para evitar o fundo preto
      headStyles: { fillColor: [212, 175, 85], textColor: [255, 255, 255], fontStyle:'bold' }, // Fundo Dourado, Texto Branco
      alternateRowStyles: { fillColor: [248, 248, 248] }, // Cinzento muito claro para as linhas alternadas
      bodyStyles: { textColor: [40, 40, 40], fillColor: [255, 255, 255] }, // Texto escuro, fundo branco
      
      columnStyles: {
        0:  { cellWidth: 8 },
        1:  { cellWidth: 44 },
        2:  { cellWidth: 26 },
        3:  { cellWidth: 48 },
        4:  { cellWidth: 30 },
        5:  { cellWidth: 38 },
        6:  { cellWidth: 10 },
        7:  { cellWidth: 20 },
        8:  { cellWidth: 18 },
        9:  { cellWidth: 26 },
        10: { cellWidth: 16 }
      }
    });
    pdf.save(`seminario_${titulo.toLowerCase().replace(/\s/g,'_')}_${new Date().toISOString().slice(0,10)}.pdf`);
    showToast('PDF exportado com sucesso!');
  }

  function gerarExcel(lista, titulo) {
    // 1. Ordenar a lista alfabeticamente pelo nome antes de exportar
    const listaOrdenada = [...lista].sort((a, b) => 
      (a.nome || '').localeCompare(b.nome || '', 'pt-BR', { sensitivity: 'base' })
    );

    const ws  = XLSX.utils.json_to_sheet(linhasExport(listaOrdenada)); // Utiliza a lista já ordenada
    const wb  = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Inscrições');
    
    // Largura das colunas
    ws['!cols'] = [
      {wch:4},{wch:28},{wch:14},{wch:28},{wch:18},{wch:28},{wch:8},{wch:16},
      {wch:14},{wch:24},{wch:10}
    ];

    // 3. Adicionar Filtros Automáticos ao Excel
    if (ws['!ref']) {
      ws['!autofilter'] = { ref: ws['!ref'] };
    }

    XLSX.writeFile(wb, `seminario_${titulo.toLowerCase().replace(/\s/g,'_')}_${new Date().toISOString().slice(0,10)}.xlsx`);
    showToast('Excel exportado com sucesso!');
  }

  // ── EXPORTAR ──────────────────────────────────────────────────────────────
  document.getElementById('exportPdfTodosBtn').addEventListener('click',
    () => gerarPdf(todosInscritos, 'Todos'));
  document.getElementById('exportPdfHcBtn').addEventListener('click',
    () => gerarPdf(todosInscritos.filter(i => i.hc_registrado === 'SIM'), 'Somente HC'));
  document.getElementById('exportExcelTodosBtn').addEventListener('click',
    () => gerarExcel(todosInscritos, 'Todos'));
  document.getElementById('exportExcelHcBtn').addEventListener('click',
    () => gerarExcel(todosInscritos.filter(i => i.hc_registrado === 'SIM'), 'Somente HC'));

  // ── ALTERAR SENHA ─────────────────────────────────────────────────────────
  document.getElementById('alterarSenhaBtn').addEventListener('click', () => {
    document.getElementById('modalSenha').classList.add('visible');
    document.getElementById('modalMsg').textContent = '';
    document.getElementById('senhaAtual').value   = '';
    document.getElementById('senhaNova').value    = '';
    document.getElementById('senhaConfirm').value = '';
  });
  document.getElementById('cancelarSenhaBtn').addEventListener('click', () => {
    document.getElementById('modalSenha').classList.remove('visible');
  });
  document.getElementById('confirmarSenhaBtn').addEventListener('click', async () => {
    const atual   = document.getElementById('senhaAtual').value;
    const nova    = document.getElementById('senhaNova').value;
    const confirm = document.getElementById('senhaConfirm').value;
    const msgEl   = document.getElementById('modalMsg');
    msgEl.textContent = '';
    if (!atual || !nova || !confirm) { msgEl.textContent = 'Preencha todos os campos.'; return; }
    if (nova !== confirm)            { msgEl.textContent = 'As senhas não coincidem.';   return; }
    if (nova.length < 4)             { msgEl.textContent = 'Senha deve ter ao menos 4 caracteres.'; return; }
    try {
      const ref  = doc(db, 'configuracoes', 'painel');
      const snap = await getDoc(ref);
      if (!snap.exists() || snap.data().senha !== atual) { msgEl.textContent = 'Senha atual incorreta.'; return; }
      await updateDoc(ref, { senha: nova });
      document.getElementById('modalSenha').classList.remove('visible');
      showToast('Senha alterada com sucesso!');
    } catch (err) { console.error(err); msgEl.textContent = 'Erro ao alterar senha.'; }
  });

  // ── VOLTAR ─────────────────────────────────────────────────────────────────
  document.getElementById('voltarBtn').addEventListener('click', () => {
    sessionStorage.removeItem('painelAutorizado');
    window.location.href = 'index.html';
  });

  // ── INIT ───────────────────────────────────────────────────────────────────
  await carregarConfig();
  await carregarInscritos();
  setInterval(carregarInscritos, 15000);
</script>
</body>
